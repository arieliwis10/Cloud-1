version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  productor-ubicaciones:
    build: ./productor-ubicaciones
    ports:
      - "8081:8080"
    depends_on:
      - rabbitmq
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq

  productor-horarios:
    build: ./productor-horarios
    ports:
      - "8082:8080"
    depends_on:
      - rabbitmq
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq

  consumidor-ubicaciones:
    build: ./consumidor-ubicaciones
    ports:
      - "8083:8080"
    depends_on:
      - rabbitmq
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq

  consumidor-horarios:
    build: ./consumidor-horarios
    ports:
      - "8084:8080"
    depends_on:
      - rabbitmq
    volumes:
      - ./data:/data
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - HORARIOS_OUTPUT_DIR=/data